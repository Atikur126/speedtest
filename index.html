<!DOCTYPE html>
<html>
<head>
    <title>SpeedTest | Atikur Rahman</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="https://cdn.jsdelivr.net/npm/librespeed-speedtest@latest/speedtest.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #speedtest { width: 100%; max-width: 600px; }
        h1 { margin-bottom: 20px; font-weight: 300; }
    </style>
</head>
<body>
    <h1>Internet Speed Test</h1>
    <div id="speedtest"></div>
    <script>
        var s = new Speedtest();
        s.setParameter("telemetryLevel", "none"); // Track korbe na, just test korbe
        s.start();
    </script>
</body>
</html>
