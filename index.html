<!DOCTYPE html>
<html>
<head>
    <title>Internet Speed Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="https://cdn.jsdelivr.net/npm/librespeed-speedtest@latest/speedtest.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/librespeed-speedtest@latest/speedtest.css">
</head>
<body>
    <div id="speedtest"></div>
    <script>
        // Speedtest কনফিগারেশন
        var s = new Speedtest();
        s.setParameter("telemetryLevel", "none"); 
        s.start();
    </script>
</body>
</html>
